<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡ADVERTENCIA!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ff0000; /* Fondo rojo chillón */
            color: #ffffff; /* Texto blanco */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            color: #ffffff; /* Texto blanco */
            font-size: 3em;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 20px;
        }

        p {
            margin: 10px 0;
            line-height: 1.5;
        }

        #ip {
            font-size: 20px;
            font-weight: bold;
            margin-top: 40px;
        }

        #captcha {
            font-size: 24px;
            margin-bottom: 20px;
        }

        #inputCaptcha {
            padding: 10px;
            font-size: 16px;
            margin-bottom: 20px;
        }

        #submitBtn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #ffffff; /* Fondo blanco */
            color: #ff0000; /* Texto rojo chillón */
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }

        #submitBtn:hover {
            background-color: #ff0000; /* Fondo rojo chillón */
            color: #ffffff; /* Texto blanco */
        }

        a {
            color: #ffffff; /* Texto blanco */
            text-decoration: none;
            border: 2px solid #ffffff; /* Borde blanco */
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }

        a:hover {
            background-color: #ffffff; /* Fondo blanco */
            color: #ff0000; /* Texto rojo chillón */
        }
    </style>
</head>
<body>
    <h1>¡ADVERTENCIA!</h1>
    <div class="message">
        <h2>SE HA DETECTADO UNA ACTIVIDAD SOSPECHOSA.</h2>
        <p><strong>Su IP ha sido registrada y será verificada.</strong></p>
        <p>De ser necesario, se tomarán acciones legales.</p>
    </div>
    <div id="captcha"></div>
    <input type="text" id="inputCaptcha" placeholder="Introduce el resultado del CAPTCHA" required>
    <button id="submitBtn" onclick="verifyCaptcha()">Verificar</button>
    <a href="index.html">Volver a Iniciar Sesión</a>
    <div id="ip"></div>

    <script>
        function generateCaptcha() {
            var num1 = Math.floor(Math.random() * 10);
            var num2 = Math.floor(Math.random() * 10);
            var operation = '+';
            var result = num1 + num2;
            var captchaText = num1 + ' ' + operation + ' ' + num2 + ' = ?';
            document.getElementById('captcha').innerText = captchaText;
            return result;
        }

        function verifyCaptcha() {
            var inputCaptcha = document.getElementById('inputCaptcha').value;
            var captchaResult = generateCaptcha();
            if (parseInt(inputCaptcha) === captchaResult) {
                alert('¡CAPTCHA correcto! Eres humano.');
                // Aquí podrías incluir el código para continuar con la acción deseada
            } else {
                alert('Respuesta incorrecta. Inténtalo de nuevo.');
                // Aquí podrías incluir el código para manejar la respuesta incorrecta
            }
        }

        // Generar el CAPTCHA al cargar la página
        window.onload = generateCaptcha;

        // Obtener la dirección IP del usuario
