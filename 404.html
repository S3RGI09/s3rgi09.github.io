<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad Sospechosa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffcccc; /* Fondo rojo claro */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            color: #cc0000; /* Rojo oscuro */
        }

        .message {
            margin-bottom: 20px;
            color: #cc0000; /* Rojo oscuro */
        }

        #ip {
            font-size: 20px;
            color: #cc0000; /* Rojo oscuro */
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>ADVERTENCIA</h1>
    <div class="message">
        <h2>ACTIVIDAD SOSPECHOSA DETECTADA</h2>
        <p>Se ha registrado su dirección IP y se verificará su acceso.</p>
        <p>De ser necesario, se tomarán medidas legales.</p>
    </div>
    <a href="index.html">Volver a Iniciar Sesión</a>
    <div id="ip"></div>

    <script>
        // Obtener la dirección IP del usuario
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('ip').innerText = 'Su dirección IP: ' + data.ip;
                // Aquí podrías incluir el código para enviar la IP por correo electrónico
                // Sin embargo, esto requiere un servicio de terceros y no se puede hacer directamente desde el navegador.
            })
            .catch(error => console.error('Error al obtener la dirección IP:', error));
    </script>
</body>
</html>
