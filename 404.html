<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡ADVERTENCIA!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ff0000; /* Fondo rojo chillón */
            color: #ffffff; /* Texto blanco */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            color: #ffffff; /* Texto blanco */
            font-size: 3em;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 20px;
        }

        p {
            margin: 10px 0;
            line-height: 1.5;
        }

        #ip {
            font-size: 20px;
            font-weight: bold;
            margin-top: 40px;
        }

        a {
            color: #ffffff; /* Texto blanco */
            text-decoration: none;
            border: 2px solid #ffffff; /* Borde blanco */
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }

        a:hover {
            background-color: #ffffff; /* Fondo blanco */
            color: #ff0000; /* Texto rojo chillón */
        }
    </style>
</head>
<body>
    <h1>¡ADVERTENCIA!</h1>
    <div class="message">
        <h2>SE HA DETECTADO UNA ACTIVIDAD SOSPECHOSA.</h2>
        <p><strong>Su IP ha sido registrada y será verificada.</strong></p>
        <p>De ser necesario, se tomarán acciones legales.</p>
    </div>
    <a href="index.html">Volver a Iniciar Sesión</a>
    <div id="ip"></div>

    <script>
        // Obtener la dirección IP del usuario
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('ip').innerText = 'Su dirección IP: ' + data.ip;
                // Aquí podrías incluir el código para enviar la IP por correo electrónico
                // Sin embargo, esto requiere un servicio de terceros y no se puede hacer directamente desde el navegador.
            })
            .catch(error => console.error('Error al obtener la dirección IP:', error));
    </script>
</body>
</html>
