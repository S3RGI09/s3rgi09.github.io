<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad Sospechosa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .message {
            margin-bottom: 20px;
        }

        #ip {
            font-size: 20px;
            color: #333;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="message">
        <p>Su IP ha quedado registrada por actividad sospechosa.</p>
        <p>Se comprobará si ha accedido a la web de manera no permitida.</p>
        <p>De ser el caso, se iniciarán acciones legales.</p>
    </div>
    <a href="index.html">Volver a Iniciar Sesión</a>
    <div id="ip"></div>

    <script>
        // Obtener la dirección IP del usuario
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('ip').innerText = 'Su dirección IP: ' + data.ip;
            })
            .catch(error => console.error('Error al obtener la dirección IP:', error));
    </script>
</body>
</html>
