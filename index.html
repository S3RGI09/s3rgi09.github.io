<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f8ff; /*Azul claro*/
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .container {
            background-color: #ADD8E6; /*Azul claro*/
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color: #333;
        }
        
        input {
            padding: 10px;
            margin: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 200px;
            text-align: center;
        }
        
        button {
            background-color: #1E90FF; /*Azul medio*/
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #FFA500; /*Naranja*/
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Iniciar Sesión</h1>
        <h3>S3RGI09</h3>
        <form id="loginForm">
            <input type="password" id="password" placeholder="Introduce tu contraseña" required>
            <br>
            <button type="submit">Acceder</button>
        </form>
        <p> </p>
        <a href="https://s3rgi09.github.io/politica_de_privacidad" target="_blank">Política de Privacidad</a>
    </div>

    <script>
        // Manejar el evento de envío del formulario
        document.getElementById("loginForm").addEventListener("submit", function(event) {
            event.preventDefault(); // Evitar el envío del formulario

            // Obtener la contraseña ingresada por el usuario
            var password = document.getElementById("password").value;

            // Verificar si la contraseña es correcta
            if (password === "2009") {
                // Redirigir al usuario a la página secreta
                window.location.href = "https://s3rgi09.github.io/s3rgi09";
            } else {
                alert("Contraseña incorrecta. Inténtalo de nuevo.");
            }
        });
    </script>
</body>
</html>
